# =============================================================================
# CustomPlayer — Unsigned IPA Cloud Build Pipeline
# Strategy: build_init.sh generates the Xcode project from scratch in the
# runner (no Tuist, no CocoaPods, no local Mac needed). xcodebuild compiles
# an unsigned arm64 device binary. The IPA is validated for size before
# upload to guarantee it is never an empty artifact.
# =============================================================================

name: Build Unsigned IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  PROJECT_NAME:        "CustomPlayer"
  SCHEME_NAME:         "CustomPlayer"
  BUNDLE_ID:           "com.custom.player"
  BUILD_CONFIG:        "Release"
  DERIVED_DATA:        "${{ github.workspace }}/DerivedData"
  ARCHIVE_PATH:        "${{ github.workspace }}/build/CustomPlayer.xcarchive"
  IPA_DIR:             "${{ github.workspace }}/output"
  IPA_NAME:            "CustomPlayer.ipa"
  MIN_APP_SIZE_BYTES:  "500000"

jobs:
  build-unsigned-ipa:
    name: Bootstrap → Compile → Package → Upload
    runs-on: macos-14
    timeout-minutes: 60

    steps:

      # ── Step 1: Checkout ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Step 2: Select Xcode ──────────────────────────────────────────────
      - name: Select latest available Xcode 15.x
        run: |
          echo "Available Xcode installations:"
          ls /Applications/Xcode*.app 2>/dev/null | sort -V || true

          XCODE=$(ls -d /Applications/Xcode_15*.app 2>/dev/null | sort -V | tail -n1 \
               || ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -n1)

          if [ -z "$XCODE" ]; then
            echo "ERROR: No Xcode installation found"
            exit 1
          fi

          echo "Selecting: $XCODE"
          sudo xcode-select --switch "$XCODE"
          xcodebuild -version
          swift --version

          # Accept licence silently — required on fresh runners
          sudo xcodebuild -license accept || true

      # ── Step 3: Run build_init.sh (project bootstrap) ─────────────────────
      - name: Bootstrap Xcode project via build_init.sh
        run: |
          chmod +x "${{ github.workspace }}/build_init.sh"
          bash "${{ github.workspace }}/build_init.sh"

      # ── Step 4: Verify project is valid before building ───────────────────
      - name: Verify Xcode project integrity
        run: |
          PROJ="${{ github.workspace }}/${{ env.PROJECT_NAME }}.xcodeproj"

          if [ ! -d "$PROJ" ]; then
            echo "ERROR: $PROJ does not exist after build_init.sh"
            ls -la "${{ github.workspace }}"
            exit 1
          fi

          echo "Project file exists:"
          ls -lh "$PROJ/project.pbxproj"

          echo "Available schemes:"
          xcodebuild -project "$PROJ" -list

          echo "Sources:"
          ls -lh "${{ github.workspace }}/Sources/"

          echo "Resources:"
          ls -lh "${{ github.workspace }}/Resources/"

      # ── Step 5: Build .app (unsigned) ─────────────────────────────────────
      # We use 'build' action (not 'archive') as first pass to catch compiler
      # errors cheaply before the longer archive phase.
      - name: Compile unsigned .app (build pass)
        run: |
          PROJ="${{ github.workspace }}/${{ env.PROJECT_NAME }}.xcodeproj"
          mkdir -p "${{ env.DERIVED_DATA }}"

          set -o pipefail
          xcodebuild build \
            -project        "$PROJ" \
            -scheme         "${{ env.SCHEME_NAME }}" \
            -configuration  "${{ env.BUILD_CONFIG }}" \
            -sdk            iphoneos \
            -destination    "generic/platform=iOS" \
            -derivedDataPath "${{ env.DERIVED_DATA }}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ONLY_ACTIVE_ARCH=NO \
            PRODUCT_BUNDLE_IDENTIFIER="${{ env.BUNDLE_ID }}" \
            SKIP_INSTALL=NO \
            2>&1 | tee /tmp/build_output.txt | \
            grep -E "(error:|warning:|Build succeeded|FAILED|note:)" || true

          # Surface the last 60 lines if the build failed
          if grep -q "** BUILD FAILED **" /tmp/build_output.txt; then
            echo ""
            echo "═══ LAST 80 LINES OF BUILD LOG ═══"
            tail -n 80 /tmp/build_output.txt
            exit 1
          fi
          echo "✓ Build pass succeeded"

      # ── Step 6: Archive (produces .xcarchive with embedded .app) ──────────
      - name: Archive unsigned .xcarchive
        run: |
          PROJ="${{ github.workspace }}/${{ env.PROJECT_NAME }}.xcodeproj"
          mkdir -p "$(dirname '${{ env.ARCHIVE_PATH }}')"

          set -o pipefail
          xcodebuild archive \
            -project        "$PROJ" \
            -scheme         "${{ env.SCHEME_NAME }}" \
            -configuration  "${{ env.BUILD_CONFIG }}" \
            -sdk            iphoneos \
            -destination    "generic/platform=iOS" \
            -archivePath    "${{ env.ARCHIVE_PATH }}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ONLY_ACTIVE_ARCH=NO \
            PRODUCT_BUNDLE_IDENTIFIER="${{ env.BUNDLE_ID }}" \
            SKIP_INSTALL=NO \
            2>&1 | tee /tmp/archive_output.txt | \
            grep -E "(error:|warning:|ARCHIVE SUCCEEDED|FAILED)" || true

          if grep -q "** ARCHIVE FAILED **" /tmp/archive_output.txt; then
            echo ""
            echo "═══ LAST 80 LINES OF ARCHIVE LOG ═══"
            tail -n 80 /tmp/archive_output.txt
            exit 1
          fi

          echo "✓ Archive succeeded"
          echo "Archive contents:"
          find "${{ env.ARCHIVE_PATH }}" -maxdepth 4 | sort

      # ── Step 7: Locate the compiled .app binary ────────────────────────────
      - name: Locate .app bundle (archive + derived data fallback)
        id: locate_app
        run: |
          # Primary: inside the .xcarchive Products/Applications/
          APP_PATH=$(find "${{ env.ARCHIVE_PATH }}" \
            -type d -name "${{ env.PROJECT_NAME }}.app" 2>/dev/null | head -n1)

          # Fallback: anywhere in DerivedData (catches build-only runs)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find "${{ env.DERIVED_DATA }}" \
              -type d -name "${{ env.PROJECT_NAME }}.app" 2>/dev/null | head -n1)
          fi

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app bundle not found in archive or DerivedData"
            echo "Archive tree:"
            find "${{ env.ARCHIVE_PATH }}" 2>/dev/null | sort || true
            echo "DerivedData top-level:"
            find "${{ env.DERIVED_DATA }}" -maxdepth 5 -name "*.app" 2>/dev/null | sort || true
            exit 1
          fi

          echo "Found .app: $APP_PATH"

          # Measure the .app to ensure it's not an empty shell
          APP_SIZE=$(du -sk "$APP_PATH" | awk '{print $1}')
          APP_SIZE_BYTES=$(( APP_SIZE * 1024 ))
          echo "  .app size: ${APP_SIZE}KB (${APP_SIZE_BYTES} bytes)"

          if [ "$APP_SIZE_BYTES" -lt "${{ env.MIN_APP_SIZE_BYTES }}" ]; then
            echo "ERROR: .app is too small ($APP_SIZE_BYTES bytes < ${{ env.MIN_APP_SIZE_BYTES }} bytes minimum)"
            echo "This usually means the binary is an empty debug stub."
            echo ".app contents:"
            ls -lh "$APP_PATH/"
            exit 1
          fi

          echo "  ✓ .app passes size guard"
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "app_size_kb=$APP_SIZE" >> $GITHUB_OUTPUT

      # ── Step 8: Package IPA with strict size validation ───────────────────
      - name: Package unsigned IPA with size guard
        id: package_ipa
        run: |
          APP_PATH="${{ steps.locate_app.outputs.app_path }}"
          mkdir -p "${{ env.IPA_DIR }}/Payload"

          echo "Copying .app into Payload/..."
          cp -R "$APP_PATH" "${{ env.IPA_DIR }}/Payload/${{ env.PROJECT_NAME }}.app"

          # Verify Payload/.app size before zipping
          PAYLOAD_SIZE_KB=$(du -sk "${{ env.IPA_DIR }}/Payload" | awk '{print $1}')
          PAYLOAD_SIZE_BYTES=$(( PAYLOAD_SIZE_KB * 1024 ))
          echo "Payload/ size: ${PAYLOAD_SIZE_KB}KB"

          if [ "$PAYLOAD_SIZE_BYTES" -lt "${{ env.MIN_APP_SIZE_BYTES }}" ]; then
            echo "ERROR: Payload/ directory is too small (${PAYLOAD_SIZE_KB}KB)"
            echo "The .app was not copied correctly."
            ls -lhR "${{ env.IPA_DIR }}/Payload/"
            exit 1
          fi

          echo "  ✓ Payload/ passes size guard (${PAYLOAD_SIZE_KB}KB)"

          # Zip into .ipa
          cd "${{ env.IPA_DIR }}"
          zip -r "${{ env.IPA_NAME }}" "Payload/" \
            --exclude "*.DS_Store" --exclude "__MACOSX/*" -q

          IPA_PATH="${{ env.IPA_DIR }}/${{ env.IPA_NAME }}"
          IPA_SIZE_KB=$(du -sk "$IPA_PATH" | awk '{print $1}')
          echo "IPA size: ${IPA_SIZE_KB}KB"

          # Validate the IPA ZIP structure via Python
          python3 - << PYEOF
          import zipfile, sys

          ipa = "$IPA_PATH"
          min_bytes = ${{ env.MIN_APP_SIZE_BYTES }}

          try:
              with zipfile.ZipFile(ipa, 'r') as z:
                  names = z.namelist()
                  total_size = sum(i.file_size for i in z.infolist())
                  payload_entries = [n for n in names if n.startswith('Payload/')]
                  binary_entries  = [n for n in names if n.endswith('/${{ env.PROJECT_NAME }}') or '/${{ env.PROJECT_NAME }}.app/' in n]

                  print(f"  IPA entries     : {len(names)}")
                  print(f"  Payload entries : {len(payload_entries)}")
                  print(f"  Uncompressed    : {total_size:,} bytes")

                  if not payload_entries:
                      print("ERROR: No Payload/ entries in IPA ZIP", file=sys.stderr)
                      sys.exit(1)

                  if total_size < min_bytes:
                      print(f"ERROR: IPA uncompressed size {total_size} < {min_bytes} minimum", file=sys.stderr)
                      sys.exit(1)

                  print(f"  ✓ IPA structure valid")
          except zipfile.BadZipFile as e:
              print(f"ERROR: Invalid ZIP file: {e}", file=sys.stderr)
              sys.exit(1)
          PYEOF

          echo "ipa_path=$IPA_PATH"     >> $GITHUB_OUTPUT
          echo "ipa_size_kb=$IPA_SIZE_KB" >> $GITHUB_OUTPUT

      # ── Step 9: Upload artifact ───────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CustomPlayer-unsigned-ipa
          path: ${{ env.IPA_DIR }}/${{ env.IPA_NAME }}
          retention-days: 30
          if-no-files-found: error

      # ── Step 10: Build Summary ────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  CustomPlayer — Build Summary"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          printf "  %-20s %s\n" "Runner:"    "macos-14 (GitHub-hosted)"
          printf "  %-20s %s\n" "Scheme:"    "${{ env.SCHEME_NAME }}"
          printf "  %-20s %s\n" "Config:"    "${{ env.BUILD_CONFIG }}"
          printf "  %-20s %s\n" "SDK:"       "iphoneos arm64 (unsigned)"
          printf "  %-20s %s\n" "Bundle ID:" "${{ env.BUNDLE_ID }}"
          APP_SIZE="${{ steps.locate_app.outputs.app_size_kb }}"
          IPA_SIZE="${{ steps.package_ipa.outputs.ipa_size_kb }}"
          IPA_PATH="${{ env.IPA_DIR }}/${{ env.IPA_NAME }}"
          if [ -f "$IPA_PATH" ]; then
            printf "  %-20s %s\n" ".app size:" "${APP_SIZE}KB"
            printf "  %-20s %s\n" "IPA size:"  "${IPA_SIZE}KB"
            printf "  %-20s %s\n" "Result:"    "✓  SUCCESS — download from Artifacts tab"
          else
            printf "  %-20s %s\n" "Result:"    "✗  FAILED — check step logs above"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
